name: prod-watchdog-env
version: 3.0.0
description: >
  Production incident response environment — 6 tasks, 11 services, realistic infrastructure.
  An AI agent acts as an on-call SRE diagnosing cascading microservice failures from noisy
  logs and metrics. Must identify root cause (not symptoms), contain blast radius, and
  remediate before cascades worsen. Features potential-based reward shaping for dense signal.
  Infrastructure: nginx-lb, api-gateway, redis-cache, auth-service, order-service,
  payment-service, inventory-service, notification-service, kafka-broker,
  postgres-primary, postgres-replica.
author: labwale
created: 2026-03-29
tags:
  - openenv
  - sre
  - incident-response
  - microservices
  - real-world

tasks:
  - id: task2
    name: nginx-lb Bad Config Deploy
    difficulty: easy
    description: >
      nginx-lb received a bad config deploy setting worker_connections to 4 (was 4096).
      nginx-lb is dropping 99% of traffic. api-gateway shows connection resets.
      All backend services are actually healthy. Roll back nginx-lb config.
      Key insight: when ALL services appear degraded, check the entry point first.
    grader: grader_task2
    max_steps: 10

  - id: task3
    name: Kafka Broker Partition Failure
    difficulty: easy
    description: >
      kafka-broker partition leader election failed after a 47s JVM GC pause (broker fenced).
      order-service producer times out silently (orders queued locally, memory growing).
      notification-service consumer group stuck with 847k undelivered messages.
      Red herrings: notification consumer lag looks primary, order memory spike looks like a leak.
      Cascade: order-service crashes at step 8, notification-service crashes at step 12.
    grader: grader_task3
    max_steps: 15

  - id: task1
    name: Redis Cache OOM — Thundering Herd
    difficulty: medium
    description: >
      redis-cache has hit memory OOM (100% utilization), causing 100% cache miss rate.
      Every request hits the DB directly (thundering herd). api-gateway shows high error rate
      and latency — this is a downstream symptom, not the root. Scale up redis-cache.
      Cascade: nginx-lb starts dropping connections at step 6 if not fixed.
    grader: grader_task1
    max_steps: 12

  - id: task5
    name: Auth Service JWT Memory Leak
    difficulty: medium
    description: >
      auth-service has a 7-day JWT validation cache memory leak — JVM heap at 96%.
      GC pauses causing 4s latency spikes. api-gateway retry storm (34% error rate, CPU 78%).
      Enable circuit breaker on api-gateway to stop retry storm, then restart auth-service.
      Red herring: api-gateway high CPU and errors look like gateway misconfiguration.
      Cascade: order-service degrades at step 8, auth-service crashes at step 14.
    grader: grader_task5
    max_steps: 20

  - id: task4
    name: Postgres Replica WAL Corruption
    difficulty: hard
    description: >
      postgres-replica has a corrupted WAL segment after an OS-level force stop.
      inventory-service reads are all failing. order-service cannot verify stock availability.
      Red herring: postgres-primary shows high CPU (it is absorbing fallback read traffic, not the root).
      Cascade: order-service goes down at step 9.
    grader: grader_task4
    max_steps: 15

  - id: task6
    name: Postgres Primary Split-Brain
    difficulty: hard
    description: >
      postgres-primary failed (disk 100% full). Auto-failover promoted postgres-replica
      but replica postgresql.conf still has read-only mode (split-brain).
      payment-service write transactions failing (ReadOnlyDatabaseException).
      3-step fix in order: (1) enable_circuit_breaker(payment-service),
      (2) rollback_deploy(postgres-primary) to restore from snapshot,
      (3) restart_service(payment-service) after primary is back.
      Red herrings: auth 23% errors look like JWT key issue, order memory looks like leak.
      Cascade: inventory degrades step 7, order crashes step 12, auth crashes step 16.
    grader: grader_task6
    max_steps: 25

action_space:
  type: object
  required:
    - action_type
  properties:
    action_type:
      type: string
      description: "Type of SRE action to take"
      enum:
        - query_logs
        - check_metrics
        - restart_service
        - rollback_deploy
        - enable_circuit_breaker
        - scale_up
        - declare_resolved
        - flush_cache
        - promote_replica
        - rebalance_partitions
    service:
      type: string
      description: "Target microservice"
      enum:
        - nginx-lb
        - api-gateway
        - redis-cache
        - auth-service
        - order-service
        - payment-service
        - inventory-service
        - notification-service
        - kafka-broker
        - postgres-primary
        - postgres-replica
    parameters:
      type: object
      description: "Optional extra parameters"

observation_space:
  type: object
  properties:
    alerts:
      type: array
      items:
        type: string
      description: "Active PagerDuty-style alerts (dynamic: appear/disappear with health state)"
    service_health:
      type: object
      description: "Health status per service: healthy | degraded | down"
    last_action_result:
      type: string
      description: "Output of the last action (logs, metrics, command output, cascade messages)"
    step_count:
      type: integer
      description: "Number of steps taken in current episode"
    available_actions:
      type: array
      items:
        type: string
      description: "Valid action_type values"

reward_range:
  min: -0.5
  max: 1.0

episode_length:
  max: 25
